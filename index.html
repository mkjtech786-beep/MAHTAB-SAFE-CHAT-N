<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>MAHTAB ADMIN - WhatsApp Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f1419;
            --bg-secondary: #111b21;
            --bg-tertiary: #202c33;
            --bg-hover: #2a3942;
            --gold-primary: #ffd700;
            --gold-secondary: #ffb800;
            --gold-gradient: linear-gradient(135deg, #ffd700 0%, #ffb800 50%, #ffed4e 100%);
            --gold-glow: 0 0 20px rgba(255, 215, 0, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #8696a0;
            --accent: #00a884;
            --incoming-bg: #202c33;
            --outgoing-bg: #005c4b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Roboto', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        .app {
            display: flex;
            height: 100%;
            height: calc(var(--vh, 1vh) * 100);
        }

        /* Sidebar - WhatsApp Style */
        .sidebar {
            width: 100%;
            max-width: 400px;
            background: var(--bg-secondary);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
            position: absolute;
        }

        /* Sidebar Header */
        .sidebar-header {
            padding: 12px 16px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: var(--gold-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #000;
            box-shadow: var(--gold-glow);
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 700;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--gold-primary);
        }

        /* Search Box */
        .search-container {
            padding: 10px 16px;
            background: var(--bg-secondary);
        }

        .search-box-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-tertiary);
            border-radius: 25px;
            padding: 8px 15px;
        }

        .search-icon {
            color: var(--text-secondary);
            font-size: 16px;
            margin-right: 10px;
        }

        .search-box {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .search-box::placeholder {
            color: var(--text-secondary);
        }

        /* User List */
        .user-list {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-secondary);
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
        }

        .user-item:hover {
            background: var(--bg-hover);
        }

        .user-item.active {
            background: var(--bg-hover);
        }

        .user-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--gold-gradient);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--gold-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #000;
            font-size: 20px;
            margin-right: 15px;
            position: relative;
            flex-shrink: 0;
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #00c853;
            border: 2px solid var(--bg-secondary);
            border-radius: 50%;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .user-name {
            font-weight: 500;
            font-size: 16px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .last-time {
            font-size: 12px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .last-time.unread {
            color: var(--gold-primary);
            font-weight: 500;
        }

        .user-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-status {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .user-status.online {
            color: #00c853;
        }

        .unread-badge {
            background: var(--gold-gradient);
            color: #000;
            font-size: 12px;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            box-shadow: var(--gold-glow);
            animation: badgePulse 2s infinite;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            position: relative;
        }

        .main-chat.hidden {
            display: none;
        }

        /* Chat Background Pattern */
        .chat-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.02) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 184, 0, 0.02) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Chat Header */
        .chat-header {
            padding: 10px 16px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--gold-primary);
        }

        .header-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--gold-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #000;
            font-weight: 700;
            flex-shrink: 0;
        }

        .header-info {
            flex: 1;
            min-width: 0;
        }

        .header-info h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-status {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-status.online {
            color: #00c853;
        }

        .header-status.online::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00c853;
            border-radius: 50%;
        }

        .header-actions {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--gold-primary);
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 5;
        }

        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 12px;
            position: relative;
            animation: messageIn 0.3s ease;
            font-size: 14.5px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.admin {
            align-self: flex-end;
            background: var(--outgoing-bg);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }

        .message.user {
            align-self: flex-start;
            background: var(--incoming-bg);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .message-audio {
            width: 220px;
            height: 36px;
            margin-top: 4px;
        }

        .message-text {
            margin-bottom: 2px;
        }

        .message-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .message.admin .message-meta {
            color: rgba(255, 255, 255, 0.6);
        }

        .tick {
            font-size: 14px;
        }

        .tick.seen {
            color: #53bdeb;
        }

        /* Date Separator */
        .date-separator {
            align-self: center;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 12px;
            margin: 10px 0;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            padding: 10px 16px;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            z-index: 5;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dots {
            display: flex;
            gap: 3px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--gold-primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .input-area {
            padding: 10px 12px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .input-wrapper {
            flex: 1;
            background: var(--bg-secondary);
            border-radius: 25px;
            padding: 5px 5px 5px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .attach-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .attach-btn:hover {
            color: var(--gold-primary);
            transform: rotate(45deg);
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        /* Voice Recording Button */
        .mic-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .mic-btn:hover {
            color: var(--gold-primary);
        }

        .mic-btn.recording {
            background: #ff4444;
            color: white;
            animation: recordingPulse 1s infinite;
        }

        @keyframes recordingPulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(255, 68, 68, 0);
            }
        }

        /* Send Button */
        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gold-gradient);
            border: none;
            color: #000;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: var(--gold-glow);
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Recording Overlay */
        .recording-overlay {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 68, 68, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        .recording-overlay.active {
            display: flex;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .recording-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .recording-time {
            font-weight: 500;
            font-size: 14px;
        }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
            z-index: 5;
        }

        .empty-icon {
            width: 120px;
            height: 120px;
            background: var(--gold-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #000;
            margin-bottom: 20px;
            box-shadow: var(--gold-glow);
        }

        .empty-text h2 {
            font-size: 22px;
            margin-bottom: 10px;
            color: var(--gold-primary);
        }

        .empty-text p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

            font-weight: 500;
            font-size: 16px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .last-time {
            font-size: 12px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .last-time.unread {
            color: var(--gold-primary);
            font-weight: 500;
        }

        .user-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-status {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .user-status.online {
            color: #00c853;
        }

        .unread-badge {
            background: var(--gold-gradient);
            color: #000;
            font-size: 12px;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            box-shadow: var(--gold-glow);
            animation: badgePulse 2s infinite;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            position: relative;
        }

        .main-chat.hidden {
            display: none;
        }

        /* Chat Background Pattern */
        .chat-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.02) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 184, 0, 0.02) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Chat Header */
        .chat-header {
            padding: 10px 16px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--gold-primary);
        }

        .header-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--gold-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #000;
            font-weight: 700;
            flex-shrink: 0;
        }

        .header-info {
            flex: 1;
            min-width: 0;
        }

        .header-info h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-status {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-status.online {
            color: #00c853;
        }

        .header-status.online::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00c853;
            border-radius: 50%;
        }

        .header-actions {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--gold-primary);
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 5;
        }

        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 12px;
            position: relative;
            animation: messageIn 0.3s ease;
            font-size: 14.5px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.admin {
            align-self: flex-end;
            background: var(--outgoing-bg);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }

        .message.user {
            align-self: flex-start;
            background: var(--incoming-bg);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .message-audio {
            width: 220px;
            height: 36px;
            margin-top: 4px;
        }

        .message-text {
            margin-bottom: 2px;
        }

        .message-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .message.admin .message-meta {
            color: rgba(255, 255, 255, 0.6);
        }

        .tick {
            font-size: 14px;
        }

        .tick.seen {
            color: #53bdeb;
        }

        /* Date Separator */
        .date-separator {
            align-self: center;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 12px;
            margin: 10px 0;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            padding: 10px 16px;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            z-index: 5;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dots {
            display: flex;
            gap: 3px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--gold-primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .input-area {
            padding: 10px 12px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .input-wrapper {
            flex: 1;
            background: var(--bg-secondary);
            border-radius: 25px;
            padding: 5px 5px 5px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .attach-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .attach-btn:hover {
            color: var(--gold-primary);
            transform: rotate(45deg);
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        /* Voice Recording Button */
        .mic-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .mic-btn:hover {
            color: var(--gold-primary);
        }

        .mic-btn.recording {
            background: #ff4444;
            color: white;
            animation: recordingPulse 1s infinite;
        }

        @keyframes recordingPulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(255, 68, 68, 0);
            }
        }

        /* Send Button */
        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gold-gradient);
            border: none;
            color: #000;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: var(--gold-glow);
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Recording Overlay */
        .recording-overlay {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 68, 68, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        .recording-overlay.active {
            display: flex;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .recording-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .recording-time {
            font-weight: 500;
            font-size: 14px;
        }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
            z-index: 5;
        }

        .empty-icon {
            width: 120px;
            height: 120px;
            background: var(--gold-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #000;
            margin-bottom: 20px;
            box-shadow: var(--gold-glow);
        }

        .empty-text h2 {
            font-size: 22px;
            margin-bottom: 10px;
            color: var(--gold-primary);
        }

        .empty-text p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold-secondary);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                max-width: none;
                position: absolute;
                top: 0;
                left: 0;
                bottom: 0;
                right: 0;
            }

            .sidebar.hidden {
                display: none;
            }

            .main-chat.hidden {
                display: none;
            }

            .back-btn {
                display: flex;
            }

            .message {
                max-width: 85%;
            }

            .message-audio {
                width: 180px;
            }
        }

        @media (min-width: 769px) {
            .back-btn {
                display: none;
            }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 10px;
            border-left: 4px solid var(--gold-primary);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 10000;
            animation: toastIn 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .toast.active {
            display: flex;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast-icon {
            color: var(--gold-primary);
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-section">
                    <div class="logo-icon">
                        <i class="fas fa-crown"></i>
                    </div>
                    <div class="logo-text">
                        <h1>MAHTAB ADMIN</h1>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="header-btn" onclick="refreshUsers()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>

            <div class="search-container">
                <div class="search-box-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-box" placeholder="Search or start new chat" id="searchBox">
                </div>
            </div>

            <div class="user-list" id="userList">
                <!-- Users will be loaded here -->
            </div>
        </div>

        <!-- Main Chat -->
        <div class="main-chat" id="mainChat">
            <div class="chat-bg"></div>
            
            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">
                    <i class="fas fa-comments"></i>
                </div>
                <div class="empty-text">
                    <h2>MAHTAB Support Chat</h2>
                    <p>Select a user to start conversation</p>
                </div>
            </div>

            <!-- Chat Header -->
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="header-left">
                    <button class="back-btn" onclick="showSidebar()">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div class="header-avatar" id="headerAvatar">U</div>
                    <div class="header-info">
                        <h3 id="headerName">User</h3>
                        <div class="header-status" id="headerStatus">Online</div>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="action-btn" onclick="clearChat()" title="Clear Chat">
                        <i class="fas fa-trash"></i>
                    </button>
                    <button class="action-btn" onclick="blockUser()" title="Block User">
                        <i class="fas fa-ban"></i>
                    </button>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                typing...
            </div>

            <!-- Messages -->
            <div class="messages-container" id="messagesContainer" style="display: none;"></div>

            <!-- Input Area -->
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                <div class="input-wrapper">
                    <button class="attach-btn" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <input type="text" class="message-input" id="messageInput" placeholder="Type a message...">
                    <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
                        <i class="fas fa-microphone"></i>
                    </button>
                </div>
                <button class="send-btn" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Recording Overlay -->
    <div class="recording-overlay" id="recordingOverlay">
        <div class="recording-dot"></div>
        <span class="recording-time" id="recordingTime">00:00</span>
        <span>Recording...</span>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-bell toast-icon"></i>
        <span id="toastMessage">New message</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, onDisconnect, remove, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqfguS1ucAtklcl06eB1JIWQr46XMpe7g",
            authDomain: "safe-chat-c0b9c.firebaseapp.com",
            databaseURL: "https://safe-chat-c0b9c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "safe-chat-c0b9c",
            storageBucket: "safe-chat-c0b9c.appspot.com",
            messagingSenderId: "119640275300",
            appId: "1:119640275300:web:20ae984f4af1ffe6a62271"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        let currentUserId = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingStartTime = null;
        let recordingInterval = null;
        let userMessagesUnsub = null;

        // Mobile height fix
        function setVH() {
            document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
        }
        setVH();
        window.addEventListener('resize', setVH);

        // Time formatter
        function formatTime(timestamp) {
            if (!timestamp) return "";
            const date = new Date(timestamp);
            let hours = date.getHours();
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            return `${hours}:${minutes} ${ampm}`;
        }

        // Format recording time
        function formatRecordingTime(seconds) {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        // Admin status
        const adminStatusRef = ref(db, 'status/admin');
        update(adminStatusRef, { state: 'online', last_seen: serverTimestamp() });
        onDisconnect(adminStatusRef).set({ state: 'offline', last_seen: serverTimestamp() });

        // Load users list
        function loadUsers() {
            onValue(ref(db, 'status'), (statusSnap) => {
                const statuses = statusSnap.val() || {};
                
                onValue(ref(db, 'chats'), (chatSnap) => {
                    const list = document.getElementById('userList');
                    list.innerHTML = '';
                    
                    chatSnap.forEach((user) => {
                        const id = user.key;
                        if (id === 'admin') return;

                        const userStat = statuses[id] || {};
                        const isOnline = userStat.state === 'online';
                        const lastTime = userStat.last_seen ? formatTime(userStat.last_seen) : 'Never';
                        
                        // Count unread messages
                        let unreadCount = 0;
                        let lastMessage = '';
                        const messages = user.child('messages').val() || {};
                        Object.entries(messages).forEach(([key, msg]) => {
                            if (msg.from === 'user' && msg.status !== 'seen') unreadCount++;
                            if (!lastMessage && msg.text) lastMessage = msg.text;
                        });

                        const div = document.createElement('div');
                        div.className = `user-item ${currentUserId === id ? 'active' : ''}`;
                        div.dataset.userId = id;
                        div.onclick = () => openChat(id);
                        
                        div.innerHTML = `
                            <div class="user-avatar">
                                ${id.charAt(0).toUpperCase()}
                                ${isOnline ? '<div class="online-indicator"></div>' : ''}
                            </div>
                            <div class="user-info">
                                <div class="user-name-row">
                                    <span class="user-name">${id}</span>
                                    <span class="last-time ${unreadCount > 0 ? 'unread' : ''}">${lastTime}</span>
                                </div>
                                <div class="user-status-row">
                                    <span class="user-status ${isOnline ? 'online' : ''}">
                                        ${lastMessage || (isOnline ? 'Online' : 'Offline')}
                                    </span>
                                    ${unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : ''}
                                </div>
                            </div>
                        `;
                        list.appendChild(div);
                    });
                });
            });
        }

        // Open chat with user
        window.openChat = function(userId) {
            currentUserId = userId;
            
            // Update UI
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messagesContainer').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('headerName').textContent = userId;
            document.getElementById('headerAvatar').textContent = userId.charAt(0).toUpperCase();
            
            // Update active state in sidebar
            document.querySelectorAll('.user-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.userId === userId) item.classList.add('active');
            });

            // On mobile, hide sidebar
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('hidden');
            }

            // Load messages
            loadMessages(userId);
        };

        // Show sidebar (mobile back button)
        window.showSidebar = function() {
            currentUserId = null;
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('chatHeader').style.display = 'none';
            document.getElementById('messagesContainer').style.display = 'none';
            document.getElementById('inputArea').style.display = 'none';
            
            if (userMessagesUnsub) {
                userMessagesUnsub();
                userMessagesUnsub = null;
            }
        };

        // Load messages
        function loadMessages(userId) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            
            // Add date separator
            const dateSep = document.createElement('div');
            dateSep.className = 'date-separator';
            dateSep.textContent = 'Today';
            container.appendChild(dateSep);
            
            if (userMessagesUnsub) userMessagesUnsub();
            
            userMessagesUnsub = onValue(ref(db, `chats/${userId}/messages`), (snap) => {
                // Only add new messages, don't clear
                snap.forEach((child) => {
                    const msg = child.val();
                    const msgId = child.key;
                    
                    // Check if message already rendered
                    if (!document.getElementById(`msg-${msgId}`)) {
                        renderMessage(msg, msgId);
                    }
                });
                scrollToBottom();
            });

            // Listen for user status
            onValue(ref(db, `status/${userId}`), (snap) => {
                const statusEl = document.getElementById('headerStatus');
                if (snap.exists()) {
                    const data = snap.val();
                    if (data.state === 'online') {
                        statusEl.textContent = 'Online';
                        statusEl.classList.add('online');
                    } else {
                        const time = formatTime(data.last_seen);
                        statusEl.textContent = `Last seen ${time}`;
                        statusEl.classList.remove('online');
                    }
                }
            });

            // Listen for typing
            onValue(ref(db, `chats/${userId}/typing_user`), (snap) => {
                const indicator = document.getElementById('typingIndicator');
                if (snap.exists() && snap.val() === true) {
                    indicator.classList.add('active');
                } else {
                    indicator.classList.remove('active');
                }
            });
        }

        // Render message
        function renderMessage(msg, key) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.id = `msg-${key}`;
            div.className = `message ${msg.from}`;
            
            let content = '';
            
            if (msg.image) {
                content += `<img src="${msg.image}" class="message-image" onclick="window.open('${msg.image}')">`;
            }
            
            if (msg.voice) {
                content += `
                    <audio controls class="message-audio">
                        <source src="${msg.voice}" type="audio/webm">
                    </audio>
                `;
            }
            
            if (msg.text) {
                content += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
            }
            
            const time = formatTime(msg.time);
            const seen = msg.from === 'admin' && msg.status === 'seen' ? '<i class="fas fa-check-double tick seen"></i>' : 
                        msg.from === 'admin' ? '<i class="fas fa-check-double tick"></i>' : '';
            
            div.innerHTML = `
                ${content}
                <div class="message-meta">
                    ${time} ${seen}
                </div>
            `;
            
            container.appendChild(div);
            
            // Mark as seen
            if (msg.from === 'user' && msg.status !== 'seen') {
                update(ref(db, `chats/${currentUserId}/messages/${key}`), { status: 'seen' });
            }
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Scroll to bottom
        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        // Send message
        window.sendMessage = function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentUserId) return;
            
            push(ref(db, `chats/${currentUserId}/messages`), {
                from: 'admin',
                text: text,
                time: Date.now(),
                status: 'sent'
            });
            
            input.value = '';
            input.focus();
        };

        // Send image
        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file || !currentUserId) return;
            
            showToast('Uploading image...');
            
            try {
                const path = `admin_media/${Date.now()}_${file.name}`;
                const snapshot = await uploadBytes(sRef(storage, path), file);
                const url = await getDownloadURL(snapshot.ref);
                
                push(ref(db, `chats/${currentUserId}/messages`), {
                    from: 'admin',
                    image: url,
                    time: Date.now(),
                    status: 'sent'
                });
                
                showToast('Image sent!');
            } catch (err) {
                showToast('Error uploading image');
                console.error(err);
            }
            
            e.target.value = '';
        };

        // Toggle voice recording
        window.toggleRecording = async function() {
            const btn = document.getElementById('micBtn');
            const overlay = document.getElementById('recordingOverlay');
            const timeEl = document.getElementById('recordingTime');
            
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                // Stop recording
                mediaRecorder.stop();
                btn.classList.remove('recording');
                btn.innerHTML = '<i class="fas fa-microphone"></i>';
                overlay.classList.remove('active');
                clearInterval(recordingInterval);
                recordingStartTime = null;
                return;
            }
            
            if (!currentUserId) {
                showToast('Select a user first');
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = async () => {
                    if (audioChunks.length === 0) return;
                    
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    
                    showToast('Sending voice message...');
                    
                    try {
                        const path = `admin_voices/${Date.now()}.webm`;
                        const snapshot = await uploadBytes(sRef(storage, path), blob);
                        const url = await getDownloadURL(snapshot.ref);
                        
                        push(ref(db, `chats/${currentUserId}/messages`), {
                            from: 'admin',
                            voice: url,
                            time: Date.now(),
                            status: 'sent'
                        });
                        
                        showToast('Voice message sent!');
                    } catch (err) {
                        showToast('Error sending voice');
                        console.error(err);
                    }
                    
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start(100); // Collect data every 100ms
                
                // Update UI
                btn.classList.add('recording');
                btn.innerHTML = '<i class="fas fa-stop"></i>';
                overlay.classList.add('active');
                
                // Start timer
                recordingStartTime = Date.now();
                recordingInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                    timeEl.textContent = formatRecordingTime(elapsed);
                }, 1000);
                
            } catch (err) {
                showToast('Microphone access denied');
                console.error(err);
            }
        };

        // Clear chat
        window.clearChat = function() {
            if (!currentUserId || !confirm('Clear all messages?')) return;
            remove(ref(db, `chats/${currentUserId}/messages`));
            document.getElementById('messagesContainer').innerHTML = '';
            showToast('Chat cleared');
        };

        // Block/unblock user
        window.blockUser = async function() {
            if (!currentUserId) return;
            
            const userRef = ref(db, `chats/${currentUserId}`);
            const snap = await get(userRef);
            const isBlocked = snap.exists() && snap.val().blocked;
            
            if (isBlocked) {
                update(userRef, { blocked: false });
                showToast('User unblocked');
            } else {
                if (confirm('Block this user?')) {
                    update(userRef, { blocked: true });
                    showToast('User blocked');
                }
            }
        };

        // Refresh users
        window.refreshUsers = function() {
            loadUsers();
            showToast('Refreshed');
        };

        // Show toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        // Search users
        document.getElementById('searchBox').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.user-item').forEach(item => {
                const name = item.querySelector('.user-name').textContent.toLowerCase();
                item.style.display = name.includes(query) ? 'flex' : 'none';
            });
        });

        // Enter key send
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Typing indicator
        let typingTimeout;
        document.getElementById('messageInput').addEventListener('input', () => {
            if (!currentUserId) return;
            update(ref(db, `chats/${currentUserId}`), { typing_admin: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                update(ref(db, `chats/${currentUserId}`), { typing_admin: false });
            }, 3000);
        });

        // Initialize
        loadUsers();
        
        // Listen for new messages (for badges)
        onValue(ref(db, 'chats'), (snap) => {
            // This triggers badge updates
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                document.getElementById('sidebar').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
