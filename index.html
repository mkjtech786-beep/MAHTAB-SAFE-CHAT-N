<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: #1a1a1a; 
            color: white; 
            height: 100vh; 
            display: flex; 
        }
        
        /* Sidebar */
        .sidebar { 
            width: 300px; 
            background: #252525; 
            border-right: 1px solid #444; 
            overflow-y: auto; 
        }
        .sidebar-header { 
            padding: 20px; 
            background: #333; 
            font-size: 20px; 
            font-weight: bold; 
            color: #ffd700; 
        }
        .user-item { 
            padding: 15px; 
            border-bottom: 1px solid #333; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
        }
        .user-item:hover { background: #333; }
        .user-item.active { background: #444; border-left: 3px solid #ffd700; }
        .user-avatar { 
            width: 40px; 
            height: 40px; 
            background: #ffd700; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: black; 
            font-weight: bold; 
            margin-right: 10px; 
        }
        
        /* Chat */
        .chat { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
        }
        .chat-header { 
            padding: 15px; 
            background: #333; 
            border-bottom: 1px solid #444; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
        }
        .message { 
            max-width: 70%; 
            padding: 10px 15px; 
            margin-bottom: 10px; 
            border-radius: 15px; 
        }
        .message.admin { 
            background: #ffd700; 
            color: black; 
            margin-left: auto; 
            border-bottom-right-radius: 5px; 
        }
        .message.user { 
            background: #444; 
            border-bottom-left-radius: 5px; 
        }
        .message img { max-width: 200px; border-radius: 10px; }
        .message audio { width: 200px; }
        
        /* Input */
        .input-area { 
            padding: 15px; 
            background: #333; 
            display: flex; 
            gap: 10px; 
        }
        .input-area input[type="text"] { 
            flex: 1; 
            padding: 10px; 
            border: none; 
            border-radius: 20px; 
            background: #555; 
            color: white; 
        }
        .btn { 
            padding: 10px 20px; 
            border: none; 
            border-radius: 20px; 
            background: #ffd700; 
            color: black; 
            cursor: pointer; 
            font-weight: bold; 
        }
        .btn:hover { background: #ffed4e; }
        
        .empty { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #888; 
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">👑 ADMIN PANEL</div>
        <div id="userList"></div>
    </div>

    <div class="chat">
        <div class="chat-header" id="chatHeader" style="display:none;">
            <span id="chatUserName">Select User</span>
            <button class="btn" onclick="clearChat()" style="background:#ff4444;color:white;">Clear</button>
        </div>
        
        <div class="messages" id="messages">
            <div class="empty">Select a user to start chatting</div>
        </div>

        <div class="input-area" id="inputArea" style="display:none;">
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="sendImage(this)">
            <button class="btn" onclick="document.getElementById('fileInput').click()">📷</button>
            <input type="text" id="msgInput" placeholder="Type message..." onkeypress="if(event.key==='Enter') sendText()">
            <button class="btn" onclick="sendText()">Send</button>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAqfguS1ucAtklcl06eB1JIWQr46XMpe7g",
            authDomain: "safe-chat-c0b9c.firebaseapp.com",
            databaseURL: "https://safe-chat-c0b9c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "safe-chat-c0b9c",
            storageBucket: "safe-chat-c0b9c.appspot.com",
            messagingSenderId: "119640275300",
            appId: "1:119640275300:web:20ae984f4af1ffe6a62271"
        };

        // Initialize
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        let currentUser = null;

        // Load Users
        function loadUsers() {
            db.ref('chats').on('value', (snapshot) => {
                const list = document.getElementById('userList');
                list.innerHTML = '';
                
                snapshot.forEach((child) => {
                    const uid = child.key;
                    if (uid === 'admin') return;
                    
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `
                        <div class="user-avatar">${uid[0].toUpperCase()}</div>
                        <div>${uid}</div>
                    `;
                    
                    // CLICK HANDLER
                    div.onclick = function() {
                        // Remove active from all
                        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
                        // Add active to clicked
                        this.classList.add('active');
                        // Open chat
                        openChat(uid);
                    };
                    
                    list.appendChild(div);
                });
            });
        }

        function openChat(uid) {
            currentUser = uid;
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('chatUserName').textContent = uid;
            
            // Load messages
            db.ref(`chats/${uid}/messages`).on('value', (snapshot) => {
                const container = document.getElementById('messages');
                container.innerHTML = '';
                
                snapshot.forEach((child) => {
                    const msg = child.val();
                    const div = document.createElement('div');
                    div.className = `message ${msg.from}`;
                    
                    if (msg.text) div.innerHTML += msg.text;
                    if (msg.image) div.innerHTML += `<br><img src="${msg.image}">`;
                    
                    container.appendChild(div);
                });
                
                container.scrollTop = container.scrollHeight;
            });
        }

        function sendText() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !currentUser) return;
            
            db.ref(`chats/${currentUser}/messages`).push({
                from: 'admin',
                text: text,
                time: Date.now()
            });
            
            input.value = '';
        }

        function sendImage(input) {
            const file = input.files[0];
            if (!file || !currentUser) return;
            
            const path = `images/${Date.now()}_${file.name}`;
            const ref = storage.ref(path);
            
            ref.put(file).then(() => {
                return ref.getDownloadURL();
            }).then((url) => {
                db.ref(`chats/${currentUser}/messages`).push({
                    from: 'admin',
                    image: url,
                    time: Date.now()
                });
                input.value = '';
            }).catch((err) => {
                alert('Error: ' + err.message);
            });
        }

        function clearChat() {
            if (!currentUser || !confirm('Clear all?')) return;
            db.ref(`chats/${currentUser}/messages`).remove();
        }

        // Start
        loadUsers();
    </script>
</body>
</html>
