<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MAHTAB ADMIN - WORKING</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050509; --sidebar: #0a0a10; --primary: #00f2fe; --text: #ffffff; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-weight: bold; color: var(--primary); border-bottom: 1px solid #222; letter-spacing: 1px; }
        .user-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .user-item:hover { background: #111; }
        .user-item.active { background: #161625; border-left: 4px solid var(--primary); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
        .dot.online { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }

        /* Chat Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #08080e; }
        .chat-header { padding: 15px; background: #0a0a10; border-bottom: 1px solid #222; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
        .msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Bubbles */
        .msg { max-width: 70%; padding: 12px; border-radius: 15px; position: relative; word-wrap: break-word; }
        .msg.admin { align-self: flex-end; background: var(--primary); color: #000; border-bottom-right-radius: 2px; }
        .msg.user { align-self: flex-start; background: #222; color: #fff; border-bottom-left-radius: 2px; }
        
        .msg img { max-width: 100%; border-radius: 10px; display: block; margin: 5px 0; cursor: pointer; }
        .msg audio { max-width: 250px; margin-top: 5px; height: 32px; border-radius: 20px; outline: none; }
        .msg.admin audio { filter: invert(1) contrast(2); }

        .msg-time { font-size: 10px; opacity: 0.7; display: block; margin-top: 5px; text-align: right; }
        
        /* Input Area */
        .input-area { padding: 15px; background: #0a0a10; display: flex; gap: 10px; border-top: 1px solid #222; align-items: center; }
        input[type="text"] { flex: 1; background: #1c1c24; border: none; padding: 12px; border-radius: 10px; color: #fff; outline: none; }
        
        .btn { border: none; border-radius: 8px; padding: 10px 15px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-icon { background: #1c1c24; color: #fff; font-size: 18px; }
        .btn-send { background: var(--primary); color: #000; }
        .btn-mic { background: #1c1c24; color: var(--primary); font-size: 20px; }
        .btn-mic.active { background: #ff4757; color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a10; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">MAHTAB ADMIN</div>
    <div id="userList" style="overflow-y:auto; flex:1;"></div>
</div>

<div class="main-chat">
    <div class="chat-header" id="chatHeader">Select a user to start</div>
    <div class="msgs" id="msgs"></div>
    
    <div class="input-area" id="inputArea" style="display:none;">
        <button class="btn btn-icon" onclick="selectImage()">📷</button>
        <input type="file" id="adminFile" accept="image/*" style="display:none" onchange="uploadImage(this)">
        
        <input type="text" id="adminInput" placeholder="Write a reply..." onkeypress="handleKey(event)">
        
        <button class="btn btn-mic" id="adminMic" onclick="toggleMic()">🎤</button>
        <button class="btn btn-send" onclick="sendText()">SEND</button>
    </div>
</div>

<!-- Firebase v8 (Stable) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAqfguS1ucAtklcl06eB1JIWQr46XMpe7g",
        authDomain: "safe-chat-c0b9c.firebaseapp.com",
        databaseURL: "https://safe-chat-c0b9c-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "safe-chat-c0b9c",
        storageBucket: "safe-chat-c0b9c.appspot.com",
        messagingSenderId: "119640275300",
        appId: "1:119640275300:web:20ae984f4af1ffe6a62271"
    };

    // Initialize
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let currentUserId = null;
    let mediaRecorder = null;
    let audioChunks = [];

    // ==========================================
    // 1. LOAD USERS (FIXED)
    // ==========================================
    function loadUsers() {
        db.ref('chats').on('value', function(snapshot) {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            
            if(!snapshot.exists()) {
                list.innerHTML = "<div style='padding:20px; color:#555;'>No users</div>";
                return;
            }
            
            snapshot.forEach(function(user) {
                const id = user.key;
                if(id === 'admin') return;
                
                const data = user.val();
                const isOnline = data.lastActive && (Date.now() - data.lastActive) < 60000;
                
                const div = document.createElement('div');
                div.className = 'user-item';
                div.id = 'user-' + id;
                
                // Check if this is current user
                if(currentUserId === id) {
                    div.classList.add('active');
                }
                
                div.innerHTML = '<span>' + id + '</span><div class="dot ' + (isOnline ? 'online' : '') + '"></div>';
                
                // CLICK HANDLER - FIXED
                div.onclick = function() {
                    console.log('Clicked:', id);
                    openUserChat(id);
                };
                
                list.appendChild(div);
            });
        });
    }

    // ==========================================
    // 2. OPEN CHAT (FIXED)
    // ==========================================
    function openUserChat(id) {
        console.log('Opening chat:', id);
        currentUserId = id;
        
        // Update active class
        document.querySelectorAll('.user-item').forEach(function(el) {
            el.classList.remove('active');
        });
        document.getElementById('user-' + id).classList.add('active');
        
        // Show chat UI
        document.getElementById('chatHeader').innerHTML = '<span>Chat: <span style="color:var(--primary)">' + id + '</span></span>';
        document.getElementById('inputArea').style.display = "flex";
        document.getElementById('msgs').innerHTML = "";
        
        // Load messages
        db.ref('chats/' + id + '/messages').off(); // Remove old listener
        db.ref('chats/' + id + '/messages').on('child_added', function(snap) {
            renderMsg(snap.val(), snap.key);
        });
    }

    // ==========================================
    // 3. RENDER MESSAGE
    // ==========================================
    function renderMsg(m, key) {
        const box = document.getElementById('msgs');
        const d = document.createElement('div');
        d.className = 'msg ' + m.from;

        if(m.text) {
            d.innerHTML += '<div>' + escapeHtml(m.text) + '</div>';
        }

        if(m.image) {
            d.innerHTML += '<img src="' + m.image + '" onclick="window.open(\'' + m.image + '\')">';
        }

        if(m.voice) {
            d.innerHTML += '<audio controls src="' + m.voice + '"></audio>';
        }

        const time = m.time ? new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
        d.innerHTML += '<span class="msg-time">' + time + '</span>';

        box.appendChild(d);
        box.scrollTop = box.scrollHeight;

        // Mark seen
        if(m.from === 'user' && m.status !== 'seen') {
            db.ref('chats/' + currentUserId + '/messages/' + key).update({status: 'seen'});
        }
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ==========================================
    // 4. SEND TEXT
    // ==========================================
    function sendText() {
        const input = document.getElementById('adminInput');
        const text = input.value.trim();
        
        if(!text || !currentUserId) {
            alert('Select user first!');
            return;
        }
        
        db.ref('chats/' + currentUserId + '/messages').push({
            from: 'admin', 
            text: text, 
            time: Date.now(),
            status: 'sent'
        });
        
        input.value = "";
    }

    function handleKey(e) {
        if(e.key === 'Enter') sendText();
    }

    // ==========================================
    // 5. UPLOAD IMAGE (FIXED)
    // ==========================================
    function selectImage() {
        if(!currentUserId) {
            alert('Select user first!');
            return;
        }
        document.getElementById('adminFile').click();
    }

    function uploadImage(input) {
        const file = input.files[0];
        if(!file || !currentUserId) return;
        
        console.log('Uploading image:', file.name);
        
        const path = 'admin_images/' + Date.now() + '_' + file.name;
        const uploadTask = storage.ref(path).put(file);
        
        uploadTask.on('state_changed', 
            function(progress) {
                console.log('Upload progress:', progress);
            },
            function(error) {
                console.error('Upload error:', error);
                alert('Upload failed: ' + error.message);
            },
            function() {
                // Success
                uploadTask.snapshot.ref.getDownloadURL().then(function(url) {
                    console.log('Image URL:', url);
                    
                    db.ref('chats/' + currentUserId + '/messages').push({
                        from: 'admin', 
                        image: url, 
                        time: Date.now()
                    });
                    
                    input.value = '';
                });
            }
        );
    }

    // ==========================================
    // 6. VOICE MESSAGE (FIXED)
    // ==========================================
    function toggleMic() {
        const btn = document.getElementById('adminMic');
        
        // Stop if recording
        if(btn.classList.contains('active')) {
            if(mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            return;
        }
        
        if(!currentUserId) {
            alert('Select user first!');
            return;
        }
        
        // Start recording
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(function(stream) {
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                btn.classList.add('active');
                
                mediaRecorder.ondataavailable = function(e) {
                    audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = function() {
                    btn.classList.remove('active');
                    
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const path = 'admin_voices/' + Date.now() + '.webm';
                    
                    console.log('Uploading voice...');
                    
                    const uploadTask = storage.ref(path).put(blob);
                    
                    uploadTask.on('state_changed',
                        null,
                        function(error) {
                            console.error('Voice error:', error);
                            alert('Voice upload failed');
                            stream.getTracks().forEach(function(t) { t.stop(); });
                        },
                        function() {
                            uploadTask.snapshot.ref.getDownloadURL().then(function(url) {
                                console.log('Voice URL:', url);
                                
                                db.ref('chats/' + currentUserId + '/messages').push({
                                    from: 'admin', 
                                    voice: url, 
                                    time: Date.now()
                                });
                                
                                stream.getTracks().forEach(function(t) { t.stop(); });
                            });
                        }
                    );
                };
                
                mediaRecorder.start();
            })
            .catch(function(err) {
                console.error('Mic error:', err);
                alert('Microphone access denied!');
            });
    }

    // Start
    loadUsers();
</script>
</body>
</html>
