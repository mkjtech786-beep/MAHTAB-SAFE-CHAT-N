<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHTAB ADMIN - PREMIUM GOLD</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #242424;
            --gold-primary: #ffd700;
            --gold-secondary: #ffb800;
            --gold-gradient: linear-gradient(135deg, #ffd700 0%, #ffb800 50%, #ffed4e 100%);
            --gold-glow: 0 0 20px rgba(255, 215, 0, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent: #2aabee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid rgba(255, 215, 0, 0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, rgba(255,215,0,0.1) 0%, transparent 100%);
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: var(--gold-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #000;
            box-shadow: var(--gold-glow);
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: 700;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text span {
            font-size: 11px;
            color: var(--gold-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .search-container {
            padding: 15px;
            position: relative;
        }

        .search-box {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 25px;
            padding: 12px 20px 12px 45px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-secondary);
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .user-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--gold-gradient);
            transform: scaleY(0);
            transition: transform 0.3s;
        }

        .user-item:hover {
            background: rgba(255, 215, 0, 0.05);
            border-color: rgba(255, 215, 0, 0.2);
        }

        .user-item.active {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.4);
        }

        .user-item.active::before {
            transform: scaleY(1);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--gold-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #000;
            font-size: 20px;
            margin-right: 15px;
            position: relative;
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #00c853;
            border: 3px solid var(--bg-secondary);
            border-radius: 50%;
            box-shadow: 0 0 10px #00c853;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .user-status {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .user-status.online {
            color: #00c853;
            font-weight: 500;
        }

        .user-meta {
            text-align: right;
        }

        .last-time {
            font-size: 12px;
            color: var(--gold-secondary);
            margin-bottom: 5px;
        }

        .unread-badge {
            background: var(--gold-gradient);
            color: #000;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: var(--gold-glow);
        }

        .blocked-badge {
            background: #ff4444;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 8px;
            margin-top: 4px;
            display: inline-block;
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            position: relative;
        }

        .chat-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 184, 0, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .chat-header {
            padding: 15px 25px;
            background: var(--bg-secondary);
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--gold-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #000;
            font-weight: 700;
            box-shadow: var(--gold-glow);
        }

        .header-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .header-status {
            font-size: 13px;
            color: var(--gold-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00c853;
            border-radius: 50%;
            box-shadow: 0 0 10px #00c853;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: var(--gold-primary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: scale(1.1);
        }

        .action-btn.block-btn {
            border-color: #ff4444;
            color: #ff4444;
        }

        .action-btn.block-btn:hover {
            background: rgba(255, 68, 68, 0.1);
        }

        .action-btn.unblock-btn {
            border-color: #00c853;
            color: #00c853;
        }

        .action-btn.unblock-btn:hover {
            background: rgba(0, 200, 83, 0.1);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 5;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            animation: messageSlide 0.3s ease;
            font-size: 14.5px;
            line-height: 1.5;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.admin {
            align-self: flex-end;
            background: var(--gold-gradient);
            color: #000;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .message.user {
            align-self: flex-start;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-bottom-left-radius: 4px;
        }

        .message-image {
            max-width: 300px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .message-audio {
            width: 250px;
            height: 40px;
            margin-top: 5px;
            border-radius: 20px;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.8;
            float: right;
            margin-left: 10px;
            margin-top: 5px;
        }

        .message-seen {
            color: #000;
            margin-left: 5px;
            opacity: 0.6;
        }

        .input-area {
            padding: 20px 25px;
            background: var(--bg-secondary);
            border-top: 1px solid rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 5;
        }

        .attach-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid rgba(255, 215, 0, 0.3);
            color: var(--gold-primary);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .attach-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: scale(1.1);
        }

        .input-container {
            flex: 1;
            background: var(--bg-tertiary);
            border-radius: 25px;
            padding: 5px 5px 5px 20px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.3s;
        }

        .input-container:focus-within {
            border-color: var(--gold-primary);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.15);
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        .mic-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--gold-primary);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-btn:hover {
            background: rgba(255, 215, 0, 0.1);
        }

        .mic-btn.recording {
            background: #ff4444;
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 68, 68, 0); }
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--gold-gradient);
            border: none;
            color: #000;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--gold-glow);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold-secondary);
            border-radius: 4px;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
            color: var(--gold-primary);
        }

        .typing-indicator {
            display: none;
            padding: 15px 25px;
            color: var(--gold-secondary);
            font-size: 14px;
            font-style: italic;
            align-items: center;
            gap: 10px;
        }

        .typing-indicator.active {
            display: flex;
        }

        .upload-toast {
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: var(--bg-secondary);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            display: none;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
            min-width: 250px;
        }

        .upload-toast.active {
            display: flex;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-top-color: var(--gold-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 280px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <div class="logo-text">
                    <h1>MAHTAB</h1>
                    <span>PREMIUM ADMIN</span>
                </div>
            </div>
        </div>

        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-box" placeholder="Search users..." id="searchBox">
        </div>

        <div class="user-list" id="userList"></div>
    </div>

    <div class="main-chat">
        <div class="chat-bg"></div>
        
        <div class="chat-header" id="chatHeader" style="display: none;">
            <div class="header-left">
                <div class="header-avatar" id="headerAvatar">U</div>
                <div class="header-info">
                    <h3 id="headerName">User</h3>
                    <div class="header-status" id="headerStatus">Online</div>
                </div>
            </div>
            <div class="header-actions">
                <button class="action-btn" onclick="clearChat()" title="Clear Chat">
                    <i class="fas fa-trash"></i>
                </button>
                <button class="action-btn block-btn" id="blockBtn" onclick="toggleBlock()" title="Block/Unblock">
                    <i class="fas fa-ban"></i>
                </button>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <i class="fas fa-ellipsis-h"></i> User is typing...
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">
                    <i class="fas fa-comments"></i>
                </div>
                <div class="empty-text">
                    <h2>Welcome Admin</h2>
                    <p>Select a user to start chatting</p>
                </div>
            </div>
        </div>

        <div class="input-area" id="inputArea" style="display: none;">
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <button class="attach-btn" onclick="selectImage()" title="Send Image">
                <i class="fas fa-image"></i>
            </button>
            
            <div class="input-container">
                <input type="text" class="message-input" id="messageInput" placeholder="Type a message...">
                <button class="mic-btn" id="micBtn" onclick="toggleRecording()" title="Voice Message">
                    <i class="fas fa-microphone"></i>
                </button>
            </div>
            
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div class="upload-toast" id="uploadToast">
        <div class="spinner"></div>
        <div>
            <div style="font-size: 14px; font-weight: 500;">Uploading...</div>
            <div style="font-size: 12px; color: var(--text-secondary); margin-top: 2px;">Please wait</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, serverTimestamp, onDisconnect, remove, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqfguS1ucAtklcl06eB1JIWQr46XMpe7g",
            authDomain: "safe-chat-c0b9c.firebaseapp.com",
            databaseURL: "https://safe-chat-c0b9c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "safe-chat-c0b9c",
            storageBucket: "safe-chat-c0b9c.appspot.com",
            messagingSenderId: "119640275300",
            appId: "1:119640275300:web:20ae984f4af1ffe6a62271"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        let currentUserId = null;
        let currentUserBlocked = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let userListData = [];

        // Initialize Admin Status
        const adminStatusRef = ref(db, 'status/admin');
        update(adminStatusRef, { state: 'online', last_seen: serverTimestamp() });
        onDisconnect(adminStatusRef).set({ state: 'offline', last_seen: serverTimestamp() });

        function formatTime(timestamp) {
            if (!timestamp) return "";
            const date = new Date(timestamp);
            let hours = date.getHours();
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            return `${hours}:${minutes} ${ampm}`;
        }

        // Load Users List
        function loadUsers() {
            onValue(ref(db, 'status'), (statusSnap) => {
                const statuses = statusSnap.val() || {};
                
                onValue(ref(db, 'chats'), (chatSnap) => {
                    const list = document.getElementById('userList');
                    list.innerHTML = '';
                    userListData = [];
                    
                    chatSnap.forEach((user) => {
                        const id = user.key;
                        if (id === 'admin') return;

                        const userStat = statuses[id] || {};
                        const isOnline = userStat.state === 'online';
                        const lastTime = userStat.last_seen ? formatTime(userStat.last_seen) : 'Never';
                        const isBlocked = user.child('blocked').val() === true;
                        
                        let unreadCount = 0;
                        const messages = user.child('messages').val() || {};
                        Object.values(messages).forEach(msg => {
                            if (msg.from === 'user' && msg.status !== 'seen') unreadCount++;
                        });

                        const userData = { id, isOnline, lastTime, unreadCount, isBlocked };
                        userListData.push(userData);

                        const div = document.createElement('div');
                        div.className = `user-item ${currentUserId === id ? 'active' : ''}`;
                        div.dataset.userid = id;
                        
                        div.innerHTML = `
                            <div class="user-avatar">
                                ${id.charAt(0).toUpperCase()}
                                ${isOnline ? '<div class="online-indicator"></div>' : ''}
                            </div>
                            <div class="user-info">
                                <div class="user-name">${id}</div>
                                <div class="user-status ${isOnline ? 'online' : ''}">
                                    ${isOnline ? 'Online' : `Last seen ${lastTime}`}
                                </div>
                                ${isBlocked ? '<span class="blocked-badge">BLOCKED</span>' : ''}
                            </div>
                            <div class="user-meta">
                                <div class="last-time">${lastTime}</div>
                                ${unreadCount > 0 ? `<div class="unread-badge">${unreadCount}</div>` : ''}
                            </div>
                        `;
                        
                        // FIXED: Proper click handler
                        div.addEventListener('click', function() {
                            openChat(id);
                        });
                        
                        list.appendChild(div);
                    });
                });
            });
        }

        // Open Chat - FIXED
        window.openChat = function(userId) {
            console.log('Opening chat with:', userId);
            currentUserId = userId;
            
            // Update UI
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('headerName').textContent = userId;
            document.getElementById('headerAvatar').textContent = userId.charAt(0).toUpperCase();
            
            // Update active state in sidebar
            document.querySelectorAll('.user-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.userid === userId) {
                    item.classList.add('active');
                }
            });

            // Check blocked status
            get(ref(db, `chats/${userId}/blocked`)).then((snap) => {
                currentUserBlocked = snap.exists() && snap.val() === true;
                updateBlockButton();
            });

            loadMessages(userId);
        }

        function updateBlockButton() {
            const btn = document.getElementById('blockBtn');
            if (currentUserBlocked) {
                btn.classList.remove('block-btn');
                btn.classList.add('unblock-btn');
                btn.innerHTML = '<i class="fas fa-unlock"></i>';
                btn.title = 'Unblock User';
            } else {
                btn.classList.remove('unblock-btn');
                btn.classList.add('block-btn');
                btn.innerHTML = '<i class="fas fa-ban"></i>';
                btn.title = 'Block User';
            }
        }

        function loadMessages(userId) {
            const container = document.getElementById('messagesContainer');
            
            onValue(ref(db, `chats/${userId}/messages`), (snap) => {
                container.innerHTML = '';
                
                snap.forEach((child) => {
                    const msg = child.val();
                    renderMessage(msg, child.key);
                });
                
                scrollToBottom();
            });

            onValue(ref(db, `chats/${userId}/typing_user`), (snap) => {
                const indicator = document.getElementById('typingIndicator');
                if (snap.exists() && snap.val() === true) {
                    indicator.classList.add('active');
                } else {
                    indicator.classList.remove('active');
                }
            });
        }

        function renderMessage(msg, key) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = `message ${msg.from}`;
            
            let content = '';
            
            if (msg.image) {
                content += `<img src="${msg.image}" class="message-image" onclick="window.open('${msg.image}')">`;
            }
            
            if (msg.voice) {
                content += `
                    <audio controls class="message-audio">
                        <source src="${msg.voice}" type="audio/webm">
                    </audio>
                `;
            }
            
            if (msg.text) {
                content += `<div>${escapeHtml(msg.text)}</div>`;
            }
            
            const time = formatTime(msg.time);
            const seen = msg.from === 'admin' && msg.status === 'seen' ? '<i class="fas fa-check-double message-seen"></i>' : '';
            
            div.innerHTML = `
                ${content}
                <div class="message-time">${time} ${seen}</div>
            `;
            
            container.appendChild(div);
            
            if (msg.from === 'user' && msg.status !== 'seen') {
                update(ref(db, `chats/${currentUserId}/messages/${key}`), { status: 'seen' });
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        // Send Text
        window.sendMessage = function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentUserId) return;
            
            push(ref(db, `chats/${currentUserId}/messages`), {
                from: 'admin',
                text: text,
                time: Date.now(),
                status: 'sent'
            });
            
            input.value = '';
        }

        // Select Image
        window.selectImage = function() {
            if (!currentUserId) {
                alert('Please select a user first!');
                return;
            }
            document.getElementById('fileInput').click();
        }

        // Upload Image - FIXED with better error handling
        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file || !currentUserId) return;
            
            const toast = document.getElementById('uploadToast');
            toast.classList.add('active');
            
            try {
                console.log('Uploading image:', file.name);
                
                const fileName = `admin_images/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
                const fileRef = sRef(storage, fileName);
                
                const snapshot = await uploadBytes(fileRef, file);
                console.log('Upload successful:', snapshot);
                
                const downloadURL = await getDownloadURL(snapshot.ref);
                console.log('Download URL:', downloadURL);
                
                await push(ref(db, `chats/${currentUserId}/messages`), {
                    from: 'admin',
                    image: downloadURL,
                    time: Date.now(),
                    status: 'sent'
                });
                
                toast.classList.remove('active');
                e.target.value = ''; // Reset input
                
            } catch (err) {
                console.error('Upload error:', err);
                alert('Upload failed: ' + err.message);
                toast.classList.remove('active');
            }
        }

        // Voice Recording - FIXED
        window.toggleRecording = async function() {
            const btn = document.getElementById('micBtn');
            
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                return;
            }
            
            if (!currentUserId) {
                alert('Please select a user first!');
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = async () => {
                    btn.classList.remove('recording');
                    btn.innerHTML = '<i class="fas fa-microphone"></i>';
                    
                    const toast = document.getElementById('uploadToast');
                    toast.classList.add('active');
                    
                    try {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const fileName = `admin_voices/${Date.now()}.webm`;
                        const voiceRef = sRef(storage, fileName);
                        
                        const snapshot = await uploadBytes(voiceRef, blob);
                        const downloadURL = await getDownloadURL(snapshot.ref);
                        
                        await push(ref(db, `chats/${currentUserId}/messages`), {
                            from: 'admin',
                            voice: downloadURL,
                            time: Date.now(),
                            status: 'sent'
                        });
                        
                        toast.classList.remove('active');
                        
                    } catch (err) {
                        console.error('Voice upload error:', err);
                        alert('Voice upload failed: ' + err.message);
                        toast.classList.remove('active');
                    }
                    
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                btn.classList.add('recording');
                btn.innerHTML = '<i class="fas fa-stop"></i>';
                
            } catch (err) {
                console.error('Mic error:', err);
                alert('Microphone access denied! Please allow microphone permission in browser.');
            }
        }

        // Clear Chat
        window.clearChat = function() {
            if (!currentUserId || !confirm('Clear all messages?')) return;
            remove(ref(db, `chats/${currentUserId}/messages`));
        }

        // Toggle Block/Unblock
        window.toggleBlock = async function() {
            if (!currentUserId) return;
            
            const newBlockStatus = !currentUserBlocked;
            await update(ref(db, `chats/${currentUserId}`), { blocked: newBlockStatus });
            currentUserBlocked = newBlockStatus;
            updateBlockButton();
            
            // Refresh user list to show blocked badge
            loadUsers();
        }

        // Enter key send
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Search filter
        document.getElementById('searchBox').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            document.querySelectorAll('.user-item').forEach(item => {
                const userName = item.querySelector('.user-name').textContent.toLowerCase();
                item.style.display = userName.includes(search) ? 'flex' : 'none';
            });
        });

        // Initialize
        loadUsers();
    </script>
</body>
</html>
