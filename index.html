<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHTAB ADMIN - GOLD</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0a0a;
            --bg2: #151515;
            --bg3: #1f1f1f;
            --gold: #ffd700;
            --gold2: #ffb700;
            --text: #ffffff;
            --text2: #888888;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        
        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--bg2);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 20px;
            background: linear-gradient(135deg, rgba(255,215,0,0.1), transparent);
            border-bottom: 1px solid #333;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #000;
            font-weight: bold;
        }
        
        .logo-text h1 {
            font-size: 18px;
            background: linear-gradient(to right, var(--gold), var(--gold2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .user-card {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: var(--bg3);
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        
        .user-card:hover {
            border-color: var(--gold);
            transform: translateX(5px);
        }
        
        .user-card.active {
            background: rgba(255,215,0,0.1);
            border-left: 3px solid var(--gold);
        }
        
        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            margin-right: 12px;
            position: relative;
        }
        
        .online-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: #00d26a;
            border: 3px solid var(--bg3);
            border-radius: 50%;
        }
        
        .user-info h4 {
            font-size: 15px;
            margin-bottom: 4px;
        }
        
        .user-info span {
            font-size: 12px;
            color: var(--text2);
        }
        
        .blocked-tag {
            background: #ff4444;
            color: white;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }
        
        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }
        
        .chat-header {
            padding: 15px 20px;
            background: var(--bg2);
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .chat-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
        }
        
        .chat-info h3 {
            font-size: 16px;
            margin-bottom: 2px;
        }
        
        .chat-info span {
            font-size: 12px;
            color: var(--gold);
        }
        
        .chat-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid #444;
            background: transparent;
            color: var(--gold);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            background: rgba(255,215,0,0.1);
            border-color: var(--gold);
        }
        
        .btn-icon.blocked {
            border-color: #ff4444;
            color: #ff4444;
        }
        
        .btn-icon.unblocked {
            border-color: #00d26a;
            color: #00d26a;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .msg {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            animation: pop 0.3s ease;
        }
        
        @keyframes pop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .msg.admin {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: #000;
            border-bottom-right-radius: 4px;
        }
        
        .msg.user {
            align-self: flex-start;
            background: var(--bg3);
            border: 1px solid #444;
            border-bottom-left-radius: 4px;
        }
        
        .msg img {
            max-width: 250px;
            border-radius: 10px;
            margin-bottom: 5px;
            cursor: pointer;
        }
        
        .msg audio {
            width: 220px;
            height: 36px;
        }
        
        .msg-time {
            font-size: 10px;
            opacity: 0.7;
            float: right;
            margin-left: 10px;
            margin-top: 4px;
        }
        
        .input-area {
            padding: 15px 20px;
            background: var(--bg2);
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .btn-attach {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #444;
            background: transparent;
            color: var(--gold);
            font-size: 20px;
            cursor: pointer;
        }
        
        .input-wrap {
            flex: 1;
            background: var(--bg3);
            border-radius: 24px;
            padding: 6px 6px 6px 20px;
            display: flex;
            align-items: center;
            border: 1px solid #444;
        }
        
        .input-wrap:focus-within {
            border-color: var(--gold);
        }
        
        .msg-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 15px;
            outline: none;
        }
        
        .btn-mic {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--gold);
            font-size: 18px;
            cursor: pointer;
        }
        
        .btn-mic.recording {
            background: #ff4444;
            color: white;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .btn-send {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: #000;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,215,0,0.3);
        }
        
        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text2);
        }
        
        .empty i {
            font-size: 80px;
            margin-bottom: 20px;
            color: var(--gold);
            opacity: 0.2;
        }
        
        .typing {
            padding: 10px 20px;
            color: var(--gold);
            font-size: 13px;
            display: none;
        }
        
        .typing.show { display: block; }
        
        .toast {
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: var(--bg2);
            border: 1px solid var(--gold);
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 1000;
        }
        
        .toast.show { display: flex; }
        
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid #444;
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-crown"></i></div>
                <div class="logo-text">
                    <h1>MAHTAB ADMIN</h1>
                </div>
            </div>
        </div>
        <div class="user-list" id="userList">
            <!-- Users loaded here -->
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
        <div class="chat-header" id="chatHeader" style="display:none;">
            <div class="chat-user">
                <div class="chat-avatar" id="chatAvatar">U</div>
                <div class="chat-info">
                    <h3 id="chatName">User</h3>
                    <span id="chatStatus">online</span>
                </div>
            </div>
            <div class="chat-actions">
                <button class="btn-icon" onclick="deleteChat()" title="Clear Chat"><i class="fas fa-trash"></i></button>
                <button class="btn-icon" id="blockBtn" onclick="toggleBlock()" title="Block/Unblock"><i class="fas fa-ban"></i></button>
            </div>
        </div>

        <div class="typing" id="typingIndicator">typing...</div>

        <div class="messages" id="messages">
            <div class="empty" id="emptyState">
                <i class="fas fa-comments"></i>
                <p>Select a user to start chatting</p>
            </div>
        </div>

        <div class="input-area" id="inputArea" style="display:none;">
            <input type="file" id="fileInput" style="display:none" onchange="uploadImage(this)">
            <button class="btn-attach" onclick="document.getElementById('fileInput').click()"><i class="fas fa-image"></i></button>
            
            <div class="input-wrap">
                <input type="text" class="msg-input" id="textInput" placeholder="Message..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="btn-mic" id="micBtn" onclick="toggleMic()"><i class="fas fa-microphone"></i></button>
            </div>
            
            <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <div class="loader"></div>
        <span id="toastText">Uploading...</span>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, serverTimestamp, onDisconnect, remove, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqfguS1ucAtklcl06eB1JIWQr46XMpe7g",
            authDomain: "safe-chat-c0b9c.firebaseapp.com",
            databaseURL: "https://safe-chat-c0b9c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "safe-chat-c0b9c",
            storageBucket: "safe-chat-c0b9c.appspot.com",
            messagingSenderId: "119640275300",
            appId: "1:119640275300:web:20ae984f4af1ffe6a62271"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // Global variables
        let currentUid = null;
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];

        // Set admin online
        update(ref(db, 'status/admin'), { state: 'online', last_seen: serverTimestamp() });
        onDisconnect(ref(db, 'status/admin')).set({ state: 'offline', last_seen: serverTimestamp() });

        // Format time
        function formatTime(ts) {
            if (!ts) return "";
            const d = new Date(ts);
            let h = d.getHours();
            const m = d.getMinutes().toString().padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            return `${h}:${m} ${ampm}`;
        }

        // ==========================================
        // USER LIST - WORKING VERSION
        // ==========================================
        
        function loadUsers() {
            const chatsRef = ref(db, 'chats');
            
            onValue(chatsRef, (snapshot) => {
                const list = document.getElementById('userList');
                list.innerHTML = '';
                
                const users = [];
                snapshot.forEach((child) => {
                    const uid = child.key;
                    if (uid === 'admin') return;
                    
                    const data = child.val();
                    users.push({
                        uid: uid,
                        blocked: data.blocked === true
                    });
                });
                
                // Fetch status for each user
                users.forEach(user => {
                    get(ref(db, `status/${user.uid}`)).then((statusSnap) => {
                        const status = statusSnap.val() || {};
                        const isOnline = status.state === 'online';
                        const lastSeen = status.last_seen ? formatTime(status.last_seen) : 'Never';
                        
                        createUserCard(user.uid, isOnline, lastSeen, user.blocked);
                    });
                });
            });
        }

        function createUserCard(uid, online, lastSeen, blocked) {
            const list = document.getElementById('userList');
            
            const card = document.createElement('div');
            card.className = 'user-card';
            if (uid === currentUid) card.classList.add('active');
            
            card.innerHTML = `
                <div class="user-avatar">
                    ${uid.charAt(0).toUpperCase()}
                    ${online ? '<div class="online-dot"></div>' : ''}
                </div>
                <div class="user-info">
                    <h4>${uid} ${blocked ? '<span class="blocked-tag">BLOCKED</span>' : ''}</h4>
                    <span style="color: ${online ? '#00d26a' : '#888'}">
                        ${online ? 'online' : lastSeen}
                    </span>
                </div>
            `;
            
            // CRITICAL: Simple click handler
            card.addEventListener('click', () => {
                selectUser(uid);
            });
            
            list.appendChild(card);
        }

        // ==========================================
        // SELECT USER - FIXED
        // ==========================================
        
        window.selectUser = function(uid) {
            console.log('Selecting user:', uid);
            currentUid = uid;
            
            // Update UI
            document.querySelectorAll('.user-card').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Show chat
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('chatName').textContent = uid;
            document.getElementById('chatAvatar').textContent = uid.charAt(0).toUpperCase();
            
            // Check block status
            get(ref(db, `chats/${uid}/blocked`)).then((snap) => {
                const blocked = snap.val() === true;
                updateBlockButton(blocked);
            });
            
            // Load messages
            loadMessages(uid);
        }

        function updateBlockButton(blocked) {
            const btn = document.getElementById('blockBtn');
            if (blocked) {
                btn.className = 'btn-icon unblocked';
                btn.innerHTML = '<i class="fas fa-unlock"></i>';
            } else {
                btn.className = 'btn-icon blocked';
                btn.innerHTML = '<i class="fas fa-ban"></i>';
            }
        }

        // ==========================================
        // MESSAGES
        // ==========================================
        
        function loadMessages(uid) {
            const msgRef = ref(db, `chats/${uid}/messages`);
            
            onValue(msgRef, (snapshot) => {
                const container = document.getElementById('messages');
                container.innerHTML = '';
                
                snapshot.forEach((child) => {
                    const msg = child.val();
                    displayMessage(msg);
                    
                    // Mark as seen
                    if (msg.from === 'user' && msg.status !== 'seen') {
                        update(ref(db, `chats/${uid}/messages/${child.key}`), { status: 'seen' });
                    }
                });
                
                container.scrollTop = container.scrollHeight;
            });
            
            // Typing indicator
            onValue(ref(db, `chats/${uid}/typing_user`), (snap) => {
                document.getElementById('typingIndicator').classList.toggle('show', snap.val() === true);
            });
        }

        function displayMessage(msg) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${msg.from}`;
            
            let content = '';
            
            if (msg.image) {
                content += `<img src="${msg.image}" onclick="window.open('${msg.image}')"><br>`;
            }
            if (msg.voice) {
                content += `<audio controls src="${msg.voice}"></audio><br>`;
            }
            if (msg.text) {
                content += escapeHtml(msg.text);
            }
            
            div.innerHTML = content + `<span class="msg-time">${formatTime(msg.time)}</span>`;
            container.appendChild(div);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==========================================
        // SEND MESSAGE
        // ==========================================
        
        window.sendMessage = function() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            
            if (!text || !currentUid) return;
            
            push(ref(db, `chats/${currentUid}/messages`), {
                from: 'admin',
                text: text,
                time: Date.now(),
                status: 'sent'
            });
            
            input.value = '';
        }

        // ==========================================
        // UPLOAD IMAGE - FIXED
        // ==========================================
        
        window.uploadImage = async function(input) {
            const file = input.files[0];
            if (!file || !currentUid) {
                alert('Select a user first!');
                return;
            }
            
            showToast('Uploading image...');
            
            try {
                // Create reference
                const fileName = `img_${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
                const fileRef = sRef(storage, `chat_images/${fileName}`);
                
                console.log('Uploading:', fileName);
                
                // Upload
                const snapshot = await uploadBytes(fileRef, file);
                console.log('Uploaded:', snapshot);
                
                // Get URL
                const url = await getDownloadURL(fileRef);
                console.log('URL:', url);
                
                // Send message
                await push(ref(db, `chats/${currentUid}/messages`), {
                    from: 'admin',
                    image: url,
                    time: Date.now(),
                    status: 'sent'
                });
                
                hideToast();
                input.value = '';
                
            } catch (err) {
                console.error('Upload error:', err);
                alert('Upload failed: ' + err.message);
                hideToast();
            }
        }

        // ==========================================
        // VOICE MESSAGE - FIXED
        // ==========================================
        
        window.toggleMic = async function() {
            const btn = document.getElementById('micBtn');
            
            // Stop recording
            if (isRecording && mediaRecorder) {
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove('recording');
                btn.innerHTML = '<i class="fas fa-microphone"></i>';
                return;
            }
            
            if (!currentUid) {
                alert('Select a user first!');
                return;
            }
            
            try {
                // Start recording
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => {
                    audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = async () => {
                    btn.classList.remove('recording');
                    btn.innerHTML = '<i class="fas fa-microphone"></i>';
                    
                    showToast('Sending voice...');
                    
                    try {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const fileName = `voice_${Date.now()}.webm`;
                        const voiceRef = sRef(storage, `chat_voices/${fileName}`);
                        
                        await uploadBytes(voiceRef, blob);
                        const url = await getDownloadURL(voiceRef);
                        
                        await push(ref(db, `chats/${currentUid}/messages`), {
                            from: 'admin',
                            voice: url,
                            time: Date.now(),
                            status: 'sent'
                        });
                        
                        hideToast();
                        
                    } catch (err) {
                        console.error('Voice error:', err);
                        alert('Voice send failed: ' + err.message);
                        hideToast();
                    }
                    
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start();
                isRecording = true;
                btn.classList.add('recording');
                btn.innerHTML = '<i class="fas fa-stop"></i>';
                
            } catch (err) {
                alert('Microphone access denied!');
            }
        }

        // ==========================================
        // BLOCK & DELETE
        // ==========================================
        
        window.toggleBlock = async function() {
            if (!currentUid) return;
            
            const btn = document.getElementById('blockBtn');
            const currentlyBlocked = btn.classList.contains('unblocked');
            
            await update(ref(db, `chats/${currentUid}`), { 
                blocked: !currentlyBlocked 
            });
            
            updateBlockButton(!currentlyBlocked);
            loadUsers(); // Refresh list
        }

        window.deleteChat = function() {
            if (!currentUid || !confirm('Delete all messages?')) return;
            remove(ref(db, `chats/${currentUid}/messages`));
        }

        // ==========================================
        // UTILS
        // ==========================================
        
        function showToast(text) {
            document.getElementById('toastText').textContent = text;
            document.getElementById('toast').classList.add('show');
        }

        function hideToast() {
            document.getElementById('toast').classList.remove('show');
        }

        // Start
        loadUsers();
    </script>
</body>
</html>
